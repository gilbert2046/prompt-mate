<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f4f0e8">
  <title>Prompt Mate</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-mark" src="assets/icon.png" alt="">
        <div><strong>Prompt Mate</strong><span data-i18n="tagline">你的常用表达，一键即用</span></div>
      </div>
      <button class="icon-button mobile-menu" id="mobileMenu" aria-label="打开场景列表">☰</button>
      <div class="display-controls"><label class="language-control" title="界面语言"><span>文</span><select id="languageSelect" aria-label="界面语言"><option value="zh">中文</option><option value="en">English</option><option value="fr">Français</option></select></label><button class="theme-toggle" id="themeToggle" aria-label="切换深浅模式"><span id="themeIcon">☾</span><span id="themeLabel">黑夜模式</span></button><button class="shortcut-hint" id="focusSearch"><kbd>⌘</kbd><kbd>K</kbd><span data-i18n="quick">快速唤起</span></button></div>
    </header>

    <section class="workspace">
      <aside class="sidebar" id="sidebar">
        <nav class="scene-list" id="sceneList" aria-label="Prompt 场景"></nav>
        <button class="add-scene" id="addScene"><span>＋</span> <span data-i18n="newScene">新建场景</span></button>
        <button class="history-button" id="openHistory"><span>↶</span> <span data-i18n="history">历史指令</span> <span class="history-count" id="historyCount">0</span></button>
        <div class="sidebar-tip"><span data-i18n="tip">提示</span><p data-i18n="shortcutTip">按 ⌘ K 搜索，↑↓ 选择，Enter 复制。</p></div>
      </aside>

      <section class="content">
        <div class="content-head">
          <div><p class="eyebrow" id="sceneEyebrow">PROMPT LIBRARY</p><div class="title-line"><h1 id="sceneTitle" title="点击修改场景名称">全部 Prompts</h1><button class="title-action" id="renameScene" hidden title="修改名称">✎</button><button class="title-action delete-scene" id="deleteScene" hidden>删除场景</button></div><p id="sceneSubtitle">找到你需要的表达，然后直接复制使用。</p></div>
          <button class="primary-button" id="addPrompt"><span>＋</span> <span data-i18n="newPrompt">新建 Prompt</span></button>
        </div>

        <div class="search-row">
          <label class="search-box"><span>⌕</span><input id="searchInput" type="search" placeholder="搜索标题、内容或标签..." autocomplete="off"><kbd>⌘ K</kbd></label>
          <button class="filter-button active" data-filter="all" data-i18n="all">全部</button>
          <button class="filter-button" data-filter="favorite" data-i18n="favorites">收藏</button>
        </div>

        <div class="result-meta"><span id="resultCount"></span><span data-i18n="copyHint">点击卡片复制完整 Prompt</span></div>
        <div class="prompt-grid" id="promptGrid"></div>
        <div class="empty-state" id="emptyState" hidden><div>⌕</div><h2 data-i18n="noResults">没有找到 Prompt</h2><p data-i18n="noResultsHelp">换个关键词，或者新建一个属于你的 Prompt。</p><button class="secondary-button" id="emptyAdd" data-i18n="newPrompt">新建 Prompt</button></div>
        <section class="history-view" id="historyView" hidden><div class="history-head"><p data-i18n="historyHelp">删除的内容会保留在这里，直到你手动清空。</p><button class="danger-button" id="clearHistory" data-i18n="clearAll">一键清空</button></div><div class="history-list" id="historyList"></div></section>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"><span>✓</span><div><strong>已复制</strong><small>现在可以粘贴到任何地方</small></div></div>

  <dialog id="promptDialog">
    <form method="dialog" id="promptForm">
      <div class="dialog-head"><div><p class="eyebrow">PROMPT EDITOR</p><h2 id="dialogTitle">新建 Prompt</h2></div><button type="button" class="close-button" data-close-dialog="promptDialog" aria-label="关闭">×</button></div>
      <input type="hidden" id="promptId">
      <label><span data-i18n="title">标题</span><input id="promptTitle" required maxlength="60" placeholder="例如：纠正我的法语"></label>
      <label><span data-i18n="scene">所属场景</span><select id="promptScene" required></select></label>
      <label><span data-i18n="promptContent">Prompt 内容</span><textarea id="promptContent" required rows="9" placeholder="写下完整的 Prompt... 支持使用 {主题} 这样的变量占位符。"></textarea></label>
      <label><span data-i18n="tags">标签</span> <span class="optional" data-i18n="commaSeparated">用逗号分隔</span><input id="promptTags" placeholder="例如：口语, 纠错, B2"></label>
      <div class="dialog-actions"><button type="button" class="danger-button" id="deletePrompt" hidden data-i18n="delete">删除</button><span></span><button type="button" data-close-dialog="promptDialog" class="ghost-button" data-i18n="cancel">取消</button><button type="submit" class="primary-button" data-i18n="savePrompt">保存 Prompt</button></div>
    </form>
  </dialog>

  <dialog id="sceneDialog" class="small-dialog">
    <form method="dialog" id="sceneForm">
      <div class="dialog-head"><div><p class="eyebrow">NEW SCENE</p><h2 data-i18n="newScene">新建场景</h2></div><button type="button" class="close-button" data-close-dialog="sceneDialog" aria-label="关闭">×</button></div>
      <label><span data-i18n="sceneName">场景名称</span><input id="sceneName" required maxlength="20" placeholder="例如：旅行计划"></label>
      <label><span data-i18n="chooseIcon">选择图标</span><div class="emoji-picker" id="emojiPicker"></div></label>
      <div class="dialog-actions"><span></span><span></span><button type="button" data-close-dialog="sceneDialog" class="ghost-button" data-i18n="cancel">取消</button><button type="submit" class="primary-button" data-i18n="createScene">创建场景</button></div>
    </form>
  </dialog>
  <script src="app.js"></script>
</body>
</html>
